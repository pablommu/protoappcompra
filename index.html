<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="transparent" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="IOP Compra" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>IOP Compra</title>

  <!-- Styles (foundations → components → app animations) -->
  <link rel="stylesheet" href="styles/foundations.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>

<div id="app">

  <!-- Fondo decorativo — imagen de movimiento abstracto -->
  <div class="app-bg" aria-hidden="true"></div>

  <!-- ════════════════════════════════════════════
       TOP BAR
  ════════════════════════════════════════════ -->
  <header class="top-bar" role="banner">

    <button class="top-bar__btn" aria-label="Perfil de usuario" type="button">
      <!-- icon: user-outlined (SDS alerts group) -->
      <svg class="icon icon--lg" viewBox="0 0 24 24" fill="none" aria-hidden="true"
           xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="8" r="4"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M4 20c0-3.866 3.582-7 8-7s8 3.134 8 7"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>

    <h1 class="top-bar__title" aria-label="IOP Compra">
      <span class="top-bar__title-bold">IOP</span><!--
   --><span class="top-bar__title-light"> COMPRA</span>
    </h1>

    <!-- Spacer para centrar el título -->
    <div class="top-bar__spacer" aria-hidden="true"></div>

  </header>

  <!-- ════════════════════════════════════════════
       MAIN
  ════════════════════════════════════════════ -->
  <main class="main-content" id="main" role="main">
    <!-- ────────────────────────────────────────
         SECCIÓN 0 · INDICADOR KPI PRINCIPAL
         Scroll vertical con snap entre KPIs
    ──────────────────────────────────────── -->
    <section class="section section--kpis" aria-label="Indicadores principales">

      <!-- Selector de KPI (campaña) — abre dropdown -->
      <div class="kpi-selector">
        <button class="kpi-selector__btn" type="button"
                id="campaign-btn"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="campaign-dropdown"
                aria-label="Cambiar campaña: I26">
          <span class="kpi-selector__label" id="kpi-metric-label">MARKUP</span>
          <span class="kpi-selector__tag" id="kpi-campaign-tag">I26</span>
          <svg class="kpi-selector__chevron icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Dropdown de campaña -->
      <div class="campaign-dropdown" id="campaign-dropdown"
           role="listbox" aria-label="Seleccionar campaña" hidden>
        <button class="campaign-option campaign-option--active" role="option" aria-selected="true"  data-campaign="I26">I26</button>
        <button class="campaign-option" role="option" aria-selected="false" data-campaign="V26">V26</button>
        <button class="campaign-option" role="option" aria-selected="false" data-campaign="I25">I25</button>
        <button class="campaign-option" role="option" aria-selected="false" data-campaign="V25">V25</button>
        <button class="campaign-option" role="option" aria-selected="false" data-campaign="I24">I24</button>
      </div>

      <!-- Fila: carousel vertical + dots a la derecha -->
      <div class="kpi-area">

        <!-- Carousel vertical con snap -->
        <div class="kpi-carousel" id="kpi-carousel">
          <div class="kpi-slide" data-index="0">
            <div class="kpi-hero__row">
              <span class="kpi-hero__value">201,61</span>
              <span class="kpi-hero__unit">%</span>
            </div>
          </div>
          <div class="kpi-slide" data-index="1">
            <div class="kpi-hero__row">
              <span class="kpi-hero__value">4,2</span>
              <span class="kpi-hero__unit">sem</span>
            </div>
          </div>
          <div class="kpi-slide" data-index="2">
            <div class="kpi-hero__row">
              <span class="kpi-hero__value">38</span>
              <span class="kpi-hero__unit"></span>
            </div>
          </div>
        </div><!-- /.kpi-carousel -->

        <!-- Page control vertical — clickable -->
        <div class="kpi-page-control" role="tablist" aria-label="Cambiar indicador">
          <button class="kpi-page-dot" data-dot="0" role="tab" aria-selected="true"  aria-label="MARKUP"></button>
          <button class="kpi-page-dot kpi-page-dot--inactive" data-dot="1" role="tab" aria-selected="false" aria-label="COBERTURA"></button>
          <button class="kpi-page-dot kpi-page-dot--inactive" data-dot="2" role="tab" aria-selected="false" aria-label="PEDIDOS"></button>
        </div>

      </div><!-- /.kpi-area -->

    </section><!-- /.section--kpis -->

    <!-- ────────────────────────────────────────
         SECCIÓN 1 · RIESGOS
    ──────────────────────────────────────── -->
    <section class="section section--risks" aria-labelledby="risks-title">
      <div class="risks-card">
        <h2 class="risks-card__title" id="risks-title">RIESGOS</h2>
        <ul class="risks-card__list" aria-label="Riesgos activos">
          <li class="risks-card__item">Hay 2 pedidos formalizados sin Ok Producción.</li>
          <li class="risks-card__item">Hay 1 pedido sin booking con embarque próximo.</li>
        </ul>
      </div>
    </section><!-- /.section--risks -->

    <!-- ────────────────────────────────────────
         SECCIÓN 2 · TU SEMANA
    ──────────────────────────────────────── -->
    <section class="section section--week"
             aria-labelledby="this-week-title">

      <div class="week-header">
        <h2 class="week-header__title" id="this-week-title">TU SEMANA</h2>
        <span class="week-header__range" aria-label="Del 02 al 08 de febrero">
          02 - 08 FEB
        </span>
      </div>

      <div class="week-divider" role="separator" aria-hidden="true"></div>

      <dl class="week-stats" aria-label="Estadísticas de tu semana">
        <div class="week-stat">
          <dt class="week-stat__label">FACTURACIÓN</dt>
          <dd class="week-stat__value">15</dd>
        </div>
        <div class="week-stat">
          <dt class="week-stat__label">EMBARQUES</dt>
          <dd class="week-stat__value">10</dd>
        </div>
      </dl>

    </section><!-- /.section--week -->

    <!-- ────────────────────────────────────────
         SECCIÓN 3 · PRÓXIMA SEMANA
    ──────────────────────────────────────── -->
    <section class="section section--next-week"
             aria-labelledby="next-week-title">

      <div class="week-header">
        <h2 class="week-header__title" id="next-week-title">PRÓXIMA SEMANA</h2>
        <span class="week-header__range" aria-label="Del 09 al 15 de febrero">
          09 - 15 FEB
        </span>
      </div>

      <div class="week-divider" role="separator" aria-hidden="true"></div>

      <dl class="week-stats" aria-label="Estadísticas de próxima semana">
        <div class="week-stat">
          <dt class="week-stat__label">FACTURACIÓN</dt>
          <dd class="week-stat__value">8</dd>
        </div>
        <div class="week-stat">
          <dt class="week-stat__label">EMBARQUES</dt>
          <dd class="week-stat__value week-stat__value--alert">11</dd>
        </div>
      </dl>

    </section><!-- /.section--next-week -->

  </main><!-- /.main-content -->

  <!-- ════════════════════════════════════════════
       BOTTOM TAB BAR
  ════════════════════════════════════════════ -->
  <nav class="tab-bar" role="navigation" aria-label="Navegación principal">

    <!-- HOME (activo) -->
    <button class="tab-bar__item tab-bar__item--active"
            type="button"
            aria-current="page"
            aria-label="Home">
      <!-- icon: home-filled (SDS others group) -->
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1H15v-6H9v6H4a1 1 0 01-1-1V10.5z"
              fill="currentColor"/>
      </svg>
      <span class="tab-bar__label">Home</span>
      <!-- indicador inferior -->
      <span class="tab-bar__indicator" aria-hidden="true"></span>
    </button>

    <!-- PEDIDOS -->
    <button class="tab-bar__item"
            type="button"
            aria-label="Pedidos">
      <!-- icon: shopping-cart-outlined (SDS shopping group) -->
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 2L3 6v14a1 1 0 001 1h16a1 1 0 001-1V6l-3-4H6z"
              stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 6h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M16 10a4 4 0 01-8 0"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-bar__label">Pedidos</span>
    </button>

    <!-- BUSCAR -->
    <button class="tab-bar__item"
            type="button"
            aria-label="Buscar">
      <!-- icon: search-outlined (SDS actions group) -->
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="11" r="7"
                stroke="currentColor" stroke-width="1.5"/>
        <path d="M16.5 16.5l4 4"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-bar__label">Buscar</span>
    </button>

  </nav><!-- /.tab-bar -->

</div><!-- /#app -->

<script src="src/app.js"></script>
</body>
</html>
