<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f0f0f0" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="IOP Compra" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>IOP Compra</title>

  <!-- Styles (foundations → components → app animations) -->
  <link rel="stylesheet" href="styles/foundations.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>

<div id="app">

  <!-- ════════════════════════════════════════════
       TOP BAR
  ════════════════════════════════════════════ -->
  <header class="top-bar" role="banner">

    <button class="top-bar__btn" aria-label="Perfil de usuario" type="button">
      <!-- icon: user-outlined (SDS alerts group) -->
      <svg class="icon icon--lg" viewBox="0 0 24 24" fill="none" aria-hidden="true"
           xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="8" r="4"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M4 20c0-3.866 3.582-7 8-7s8 3.134 8 7"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>

    <h1 class="top-bar__title" aria-label="IOP Compra">
      <span class="top-bar__title-bold">IOP</span><!--
   --><span class="top-bar__title-light"> COMPRA</span>
    </h1>

    <!-- Spacer para centrar el título -->
    <div class="top-bar__spacer" aria-hidden="true"></div>

  </header>

  <!-- ════════════════════════════════════════════
       MAIN
  ════════════════════════════════════════════ -->
  <main class="main-content" id="main" role="main">

    <!-- ────────────────────────────────────────
         SECCIÓN 0 · INDICADORES CLAVE
    ──────────────────────────────────────── -->
    <section class="section section--kpis" aria-label="Indicadores clave">
      <dl class="kpi-scroll" aria-label="Indicadores clave">

        <div class="kpi-item">
          <dt class="kpi-item__label">MARKUP MEDIO</dt>
          <dd class="kpi-item__row">
            <span class="kpi-item__value">201,61</span>
            <span class="kpi-item__unit">%</span>
          </dd>
        </div>

        <div class="kpi-item">
          <dt class="kpi-item__label">COBERTURA</dt>
          <dd class="kpi-item__row">
            <span class="kpi-item__value">4,2</span>
            <span class="kpi-item__unit">sem</span>
          </dd>
        </div>

        <div class="kpi-item">
          <dt class="kpi-item__label">PEDIDOS ACTIVOS</dt>
          <dd class="kpi-item__row">
            <span class="kpi-item__value">38</span>
          </dd>
        </div>

      </dl>

      <!-- Dots de posición -->
      <div class="kpi-dots" role="tablist" aria-label="Indicador activo"></div>

    </section><!-- /.section--kpis -->

    <!-- ────────────────────────────────────────
         SECCIÓN 1 · TU SEMANA
    ──────────────────────────────────────── -->
    <section class="section section--week"
             aria-labelledby="this-week-title">

      <div class="week-header">
        <h2 class="week-header__title" id="this-week-title">TU SEMANA</h2>
        <span class="week-header__range" aria-label="Del 02 al 08 de marzo">
          02 - 08 MAR
        </span>
      </div>

      <div class="week-divider" role="separator" aria-hidden="true"></div>

      <dl class="week-stats" aria-label="Estadísticas de tu semana">
        <div class="week-stat">
          <dt class="week-stat__label">FACTURACIÓN</dt>
          <dd class="week-stat__value">15</dd>
        </div>
        <div class="week-stat">
          <dt class="week-stat__label">EMBARQUES</dt>
          <dd class="week-stat__value">10</dd>
        </div>
      </dl>

    </section><!-- /.section--week -->

    <!-- ────────────────────────────────────────
         SECCIÓN 2 · PRÓXIMA SEMANA
    ──────────────────────────────────────── -->
    <section class="section section--next-week"
             aria-labelledby="next-week-title">

      <div class="week-header">
        <h2 class="week-header__title" id="next-week-title">PRÓXIMA SEMANA</h2>
        <span class="week-header__range" aria-label="Del 09 al 15 de marzo">
          09 - 15 MAR
        </span>
      </div>

      <div class="week-divider" role="separator" aria-hidden="true"></div>

      <dl class="week-stats" aria-label="Estadísticas de próxima semana">
        <div class="week-stat">
          <dt class="week-stat__label">FACTURACIÓN</dt>
          <dd class="week-stat__value">8</dd>
        </div>
        <div class="week-stat">
          <dt class="week-stat__label">EMBARQUES</dt>
          <dd class="week-stat__value">11</dd>
        </div>
      </dl>

    </section><!-- /.section--next-week -->

    <!-- ────────────────────────────────────────
         SECCIÓN 3 · ALERTAS SUGERIDAS (AI)
    ──────────────────────────────────────── -->
    <section class="section section--alerts"
             aria-labelledby="alerts-title">

      <div class="section__header">
        <h2 class="section__title" id="alerts-title">
          ALERTAS SUGERIDAS
        </h2>

        <!-- Badge AI — sds-color-special-ai #6680ff -->
        <span class="ai-badge" role="note" aria-label="Generado por Inditex AI">
          <img class="ai-badge__icon" src="assets/icon.gif" alt="" aria-hidden="true" />
          Inditex AI
        </span>
      </div>

      <!-- Carrusel de alertas (scroll horizontal snap) — renderizado por JS desde data/alerts.json -->
      <div class="alerts-scroll"
           role="list"
           aria-label="Alertas sugeridas por Inditex AI">
      </div><!-- /.alerts-scroll -->

      <!-- Indicador de posición (dots) — renderizado por JS -->
      <div class="carousel-dots" role="tablist" aria-label="Posición en el carrusel de alertas">
      </div>

    </section><!-- /.section--alerts -->

  </main><!-- /.main-content -->

  <!-- ════════════════════════════════════════════
       BOTTOM TAB BAR
  ════════════════════════════════════════════ -->
  <nav class="tab-bar" role="navigation" aria-label="Navegación principal">

    <!-- HOME (activo) -->
    <button class="tab-bar__item tab-bar__item--active"
            type="button"
            aria-current="page"
            aria-label="Home">
      <!-- indicador superior -->
      <span class="tab-bar__indicator" aria-hidden="true"></span>
      <!-- icon: home-filled (SDS others group) -->
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1H15v-6H9v6H4a1 1 0 01-1-1V10.5z"
              fill="currentColor"/>
      </svg>
      <span class="tab-bar__label">Home</span>
    </button>

    <!-- PEDIDOS -->
    <button class="tab-bar__item"
            type="button"
            aria-label="Pedidos">
      <!-- icon: shopping-cart-outlined (SDS shopping group) -->
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 2L3 6v14a1 1 0 001 1h16a1 1 0 001-1V6l-3-4H6z"
              stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 6h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M16 10a4 4 0 01-8 0"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-bar__label">Pedidos</span>
    </button>

    <!-- BUSCAR -->
    <button class="tab-bar__item"
            type="button"
            aria-label="Buscar">
      <!-- icon: search-outlined (SDS actions group) -->
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="11" r="7"
                stroke="currentColor" stroke-width="1.5"/>
        <path d="M16.5 16.5l4 4"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-bar__label">Buscar</span>
    </button>

  </nav><!-- /.tab-bar -->

</div><!-- /#app -->

<script src="src/app.js"></script>
</body>
</html>
